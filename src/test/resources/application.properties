spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
app.jwt.secret=test-secret-key-test-secret-key-12345
app.security.jwt-expiration-minutes=600
app.security.password-expiry-months=6
app.security.max-failed-login-attempts=5
app.security.lock-duration-minutes=30
app.security.auth-state-sync-cron=0 0 * * * *
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.sql.init.mode=never
